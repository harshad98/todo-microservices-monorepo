apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway
  namespace: todo-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      containers:

      - name: api-gateway

        image: harshad321/api-gateway:v3

        ports:
        - containerPort: 8080