apiVersion: apps/v1
kind: Deployment

metadata:
  name: react-client
  namespace: todo-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: react-client

  template:
    metadata:
      labels:
        app: react-client

    spec:
      containers:

      - name: react-client

        image: harshad321/react-client:v4

        ports:
        - containerPort: 80
