server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:

    gateway:

      globalcors:

        cors-configurations:

          '[/**]':

            allowedOrigins:
              - "http://localhost:5173"

            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS

            allowedHeaders:
              - "*"

            allowCredentials: true

      routes:

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: todo-service
          uri: http://localhost:8082
          predicates:
            - Path=/todos/**

management:
  endpoints:
    web:
      exposure:
        include: "*"